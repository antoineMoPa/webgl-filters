<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>glFilters demo</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: system-ui, -apple-system, sans-serif; background: #0d1117; color: #e6edf3; padding: 1.5rem; }
    h1 { margin-bottom: 0.25rem; }
    .subtitle { color: #8b949e; margin-bottom: 1.5rem; }
    .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(340px, 1fr)); gap: 1.25rem; }
    .card { background: #161b22; border: 1px solid #30363d; border-radius: 8px; padding: 1rem; }
    .card h3 { margin-bottom: 0.5rem; font-size: 1rem; }
    .card canvas { width: 100%; height: auto; border-radius: 4px; background: #000; }
    .controls { margin: 0.5rem 0; display: flex; align-items: center; gap: 0.5rem; flex-wrap: wrap; }
    .controls label { font-size: 0.85rem; color: #8b949e; min-width: 60px; }
    .controls input[type=range] { flex: 1; min-width: 100px; accent-color: #58a6ff; }
    .controls .value { font-size: 0.8rem; color: #58a6ff; min-width: 40px; text-align: right; font-variant-numeric: tabular-nums; }
    .timing { font-size: 0.75rem; color: #3fb950; margin-top: 0.25rem; }
    .kernel-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 2px; margin: 0.5rem 0; }
    .kernel-grid input { width: 100%; padding: 0.2rem; text-align: center; background: #0d1117; color: #e6edf3; border: 1px solid #30363d; border-radius: 3px; font-size: 0.75rem; }
    textarea { width: 100%; height: 100px; background: #0d1117; color: #e6edf3; border: 1px solid #30363d; border-radius: 4px; padding: 0.5rem; font-family: monospace; font-size: 0.8rem; resize: vertical; margin: 0.5rem 0; }
    .pipeline-section { margin-top: 1.5rem; background: #161b22; border: 1px solid #30363d; border-radius: 8px; padding: 1rem; }
    .pipeline-section h2 { font-size: 1.1rem; margin-bottom: 0.75rem; }
    .pipeline-checks { display: flex; flex-wrap: wrap; gap: 0.75rem; margin-bottom: 0.75rem; }
    .pipeline-checks label { font-size: 0.85rem; cursor: pointer; }
    .pipeline-checks input { accent-color: #58a6ff; margin-right: 0.25rem; }
    .pipeline-result { display: flex; gap: 1rem; align-items: flex-start; flex-wrap: wrap; }
    .pipeline-result canvas { max-width: 320px; border-radius: 4px; background: #000; }
    #drop-zone { border: 2px dashed #30363d; border-radius: 8px; padding: 1rem; text-align: center; color: #8b949e; margin-bottom: 1.5rem; cursor: pointer; transition: border-color 0.15s; }
    #drop-zone:hover, #drop-zone.dragover { border-color: #58a6ff; }
    #drop-zone input { display: none; }
    .url-load { display: flex; gap: 0.5rem; margin-bottom: 1.5rem; }
    .url-load input[type=text] { flex: 1; padding: 0.5rem 0.75rem; background: #161b22; color: #e6edf3; border: 1px solid #30363d; border-radius: 6px; font-size: 0.9rem; }
    .url-load button { padding: 0.5rem 1rem; background: #238636; color: #fff; border: none; border-radius: 6px; cursor: pointer; font-size: 0.9rem; }
    .url-load button:hover { background: #2ea043; }
  </style>
</head>
<body>
  <h1>glFilters demo</h1>
  <p class="subtitle">Each filter runs as a WebGL fragment shader. Timings include GPU render + readPixels.</p>

  <div id="drop-zone">
    <p>Drop an image here or click to upload</p>
    <input type="file" accept="image/*" id="file-input">
  </div>

  <div class="url-load">
    <input type="text" id="url-input" placeholder="Or paste an image URL…">
    <button id="url-load-btn">Load</button>
  </div>

  <div class="grid" id="filter-grid"></div>

  <div class="pipeline-section">
    <h2>Pipeline (chained filters)</h2>
    <div class="pipeline-checks" id="pipeline-checks"></div>
    <div class="pipeline-result">
      <div>
        <canvas id="pipeline-canvas" width="320" height="240"></canvas>
        <div class="timing" id="pipeline-timing"></div>
      </div>
    </div>
  </div>

  <script type="module" src="demo.js"></script>
</body>
</html>
